<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="0.5">
  <!-- Stadium outline -->
  <ellipse cx="50" cy="50" rx="45" ry="40" fill="#f5f5dc" stroke="#333" stroke-width="1"/>

  <!-- Field -->
  <rect x="25" y="35" width="50" height="30" fill="#4a7c4e" stroke="#2d5a2d" stroke-width="0.5"/>

  <!-- Lower bowl sections -->
  <path d="M 30 35 Q 20 30 25 45" fill="#c9e4ca" stroke="#4a7c4e"/>
  <path d="M 35 35 Q 30 28 40 40" fill="#c9e4ca" stroke="#4a7c4e"/>
  <text x="30" y="42" font-size="3" fill="#333">105</text>

  <path d="M 75 35 Q 85 30 80 45" fill="#c9e4ca" stroke="#4a7c4e"/>
  <path d="M 70 35 Q 65 28 75 40" fill="#c9e4ca" stroke="#4a7c4e"/>
  <text x="72" y="42" font-size="3" fill="#333">114</text>

  <path d="M 45 65 Q 40 60 50 70" fill="#c9e4ca" stroke="#4a7c4e"/>
  <path d="M 55 65 Q 60 60 55 72" fill="#c9e4ca" stroke="#4a7c4e"/>
  <text x="48" y="70" font-size="3" fill="#333">108</text>

  <path d="M 75 50 Q 85 45 80 55" fill="#c9e4ca" stroke="#4a7c4e"/>
  <text x="76" y="55" font-size="3" fill="#333">112</text>

  <!-- Upper bowl -->
  <path d="M 15 50 Q 10 35 25 30" fill="#e8d4a8" stroke="#8b7355"/>
  <path d="M 85 50 Q 90 35 75 30" fill="#e8d4a8" stroke="#8b7355"/>
  <text x="18" y="42" font-size="3" fill="#333">210</text>

  <!-- Gates -->
  <rect x="45" y="5" width="10" height="8" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="47" y="10" font-size="2.5" fill="#0066cc">Gate A</text>

  <rect x="85" y="35" width="8" height="10" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="86" y="40" font-size="2.5" fill="#0066cc">Gate B</text>

  <rect x="45" y="85" width="10" height="8" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="47" y="90" font-size="2.5" fill="#0066cc">Gate C</text>

  <rect x="5" y="35" width="8" height="10" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="6" y="40" font-size="2.5" fill="#0066cc">Gate D</text>

  <!-- Elevators -->
  <circle cx="50" cy="22" r="3" fill="#fff" stroke="#ff6600" stroke-width="0.5"/>
  <text x="48" y="21" font-size="2" fill="#ff6600">E1</text>

  <circle cx="82" cy="42" r="3" fill="#fff" stroke="#ff6600" stroke-width="0.5"/>
  <text x="80" y="41" font-size="2" fill="#ff6600">E2</text>

  <!-- Accessible restrooms -->
  <circle cx="25" cy="33" r="2" fill="#fff" stroke="#00aa00" stroke-width="0.5"/>
  <text x="23" y="32" font-size="2" fill="#00aa00">WC</text>

  <circle cx="80" cy="50" r="2" fill="#fff" stroke="#00aa00" stroke-width="0.5"/>
  <text x="78" y="49" font-size="2" fill="#00aa00">WC</text>

  <!-- First aid -->
  <rect x="33" y="26" width="4" height="4" fill="#ffcccc" stroke="#cc0000" stroke-width="0.5"/>
  <text x="34" y="29" font-size="2" fill="#cc0000">+</text>

  <!-- Quiet room -->
  <rect x="38" y="40" width="4" height="4" fill="#e6e6ff" stroke="#6666cc" stroke-width="0.5"/>
  <text x="39" y="43" font-size="2" fill="#6666cc">Q</text>

  <!-- Service animal -->
  <circle cx="86" cy="40" r="2" fill="#ffffcc" stroke="#cc9900" stroke-width="0.5"/>
  <text x="85" y="39" font-size="1.5" fill="#cc9900">P</text>

  <!-- Legend -->
  <text x="2" y="97" font-size="2.5" fill="#333">E=Elevator, WC=Accessible Restroom, +=First Aid, Q=Quiet Room, P=Pet Area</text>
</svg>